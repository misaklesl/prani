
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #scene {
    width: 100%;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }
  #hint {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .door-frame {
    width: 260px;
    height: 360px;
    border: 5px solid #0a7a7a;
    border-radius: 4px 4px 0 0;
    position: relative;
    background: #0d9e9e;
    perspective: 900px;
  }
  .door-panel {
    width: 100%;
    height: 100%;
    background: #11b5b5;
    border-radius: 2px 2px 0 0;
    position: absolute;
    top: 0; left: 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    will-change: transform;
  }
  .door-panel.open {
    transform: perspective(900px) rotateY(-110deg);
  }
  .door-panel-inner {
    position: absolute;
    top: 16px; left: 16px;
    right: 16px;
    height: calc(100% - 32px);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 2px;
    pointer-events: none;
  }
  .door-decoration {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: none;
  }
  .door-star { font-size: 48px; line-height: 1; }
  .door-label {
    font-size: 16px;
    font-weight: 500;
    color: #e0fafa;
    text-align: center;
    line-height: 1.4;
    text-shadow: 0 1px 3px rgba(0,0,0,0.25);
  }
  .door-knob {
    width: 18px; height: 18px;
    background: #f0d060;
    border-radius: 50%;
    border: 2px solid #c8a820;
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
  }
  .card-content {
    width: 260px;
    height: 360px;
    position: absolute;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 24px 20px;
    background: linear-gradient(160deg, #fff9f0 0%, #fdebd0 100%);
    border-radius: 2px 2px 0 0;
    opacity: 0;
    transition: opacity 0.4s ease 0.3s;
    pointer-events: none;
    text-align: center;
  }
  .card-content.visible {
    opacity: 1;
    pointer-events: auto;
    cursor: pointer;
  }
  .confetti-emoji {
    font-size: 30px;
    animation: bounce 1.2s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-8px); }
  }
  .recipient {
    font-size: 20px;
    font-weight: 500;
    color: #0a7a7a;
  }
  .main-wish {
    font-size: 19px;
    font-weight: 500;
    color: #8B3A0F;
    line-height: 1.35;
  }
  .tagline {
    font-size: 15px;
    color: #a05a2c;
    font-style: italic;
    line-height: 1.5;
  }
  .from-badge {
    font-size: 13px;
    color: #0a7a7a;
    border: 1px solid #a0dede;
    border-radius: 20px;
    padding: 5px 16px;
    background: #e8fafa;
  }
  .confetti-wrap {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .cc {
    position: absolute;
    width: 9px; height: 9px;
    border-radius: 2px;
    opacity: 0;
  }
  #key-hint {
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--color-text-tertiary);
    text-align: center;
  }
  .key-badge {
    display: inline-block;
    border: 1px solid var(--color-border-secondary);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 12px;
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
    margin: 0 2px;
  }
</style>

<div id="scene">
  <div id="hint">Otevři dveře šipkami ← → na klávesnici nebo kliknutím</div>
  <div class="door-frame" id="frame">
    <div class="card-content" id="card">
      <div class="confetti-emoji">🎂</div>
      <div class="recipient">Martine,</div>
      <div class="main-wish">Všechno nejlepší<br>k narozeninám!</div>
      <div class="tagline">Ať to šlape další rok!</div>
      <div class="from-badge">Přeje celý tým 🎉</div>
      <div class="confetti-wrap" id="confetti-wrap"></div>
    </div>
    <div class="door-panel" id="door">
      <div class="door-panel-inner"></div>
      <div class="door-decoration">
        <div class="door-star">🎁</div>
        <div class="door-label">Klikni nebo<br>stiskni šipku</div>
      </div>
      <div class="door-knob"></div>
    </div>
  </div>
  <div id="key-hint">
    <span class="key-badge">←</span> zavřít &nbsp;|&nbsp; <span class="key-badge">→</span> otevřít
  </div>
</div>

<script>
const door = document.getElementById('door');
const card = document.getElementById('card');
const wrap = document.getElementById('confetti-wrap');
let isOpen = false;
let confettiDone = false;

function openDoor() {
  if (isOpen) return;
  isOpen = true;
  door.classList.add('open');
  setTimeout(() => {
    card.classList.add('visible');
    if (!confettiDone) { spawnConfetti(); confettiDone = true; }
  }, 350);
}
function closeDoor() {
  if (!isOpen) return;
  isOpen = false;
  card.classList.remove('visible');
  door.classList.remove('open');
}

door.addEventListener('click', () => isOpen ? closeDoor() : openDoor());
card.addEventListener('click', closeDoor);
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') { e.preventDefault(); openDoor(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); closeDoor(); }
});

const colors = ['#f87171','#fb923c','#fbbf24','#34d399','#2dd4bf','#60a5fa','#a78bfa','#f472b6'];
function spawnConfetti() {
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cc';
      el.style.left = (Math.random() * 100) + '%';
      el.style.top = '-12px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.transform = 'rotate(' + (Math.random()*180) + 'deg)';
      wrap.appendChild(el);
      const duration = 900 + Math.random() * 800;
      const endX = (Math.random() - 0.5) * 60;
      const endY = 100 + Math.random() * 180;
      el.animate([
        { opacity: 1, transform: `translate(0,0) rotate(0deg)` },
        { opacity: 0, transform: `translate(${endX}px,${endY}px) rotate(${Math.random()*360}deg)` }
      ], { duration, easing: 'ease-in', fill: 'forwards' });
      setTimeout(() => el.remove(), duration + 100);
    }, i * 35);
  }
}
</script>
