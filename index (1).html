<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narozeninové přání – Martine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="scene">
    <div id="hint">Otevři dveře šipkami ← → na klávesnici nebo kliknutím</div>

    <div class="door-frame" id="frame">
      <div class="card-content" id="card">
        <div class="confetti-emoji">🎂</div>
        <div class="recipient">Martine,</div>
        <div class="main-wish">Všechno nejlepší<br>k narozeninám!</div>
        <div class="tagline">Ať to šlape další rok!</div>
        <div class="from-badge">Přeje celý tým 🎉</div>
        <div class="confetti-wrap" id="confetti-wrap"></div>
      </div>

      <div class="door-panel" id="door">
        <div class="door-panel-inner"></div>
        <div class="door-decoration">
          <div class="door-star">🎁</div>
          <div class="door-label">Klikni nebo<br>stiskni šipku</div>
        </div>
        <div class="door-knob"></div>
      </div>
    </div>

    <div id="key-hint">
      <span class="key-badge">←</span> zavřít &nbsp;|&nbsp; <span class="key-badge">→</span> otevřít
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
